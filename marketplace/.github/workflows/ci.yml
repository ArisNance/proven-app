name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install JS deps
        run: npm ci
      - name: Build assets
        run: |
          npm run build
          npm run build:css
      - name: Run specs
        run: bundle exec rspec
