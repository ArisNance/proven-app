services:
  - type: web
    name: proven-marketplace-web
    env: ruby
    plan: starter
    buildCommand: bundle install && npm install && npm run build && npm run build:css
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: proven-marketplace-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: proven-marketplace-redis
          property: connectionString

  - type: worker
    name: proven-marketplace-worker
    env: ruby
    plan: starter
    buildCommand: bundle install
    startCommand: bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: proven-marketplace-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: proven-marketplace-redis
          property: connectionString

databases:
  - name: proven-marketplace-db
    databaseName: proven_marketplace
    user: proven
